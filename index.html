<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BRUNBET</title>
  <link rel="icon" href="imagenes/favicon.png" type="image/png" />

  <!-- Preload assets críticos -->
  <link rel="preload" as="image" href="imagenes/logo.png" type="image/png" fetchpriority="high" />
  <link rel="preload" as="image" href="imagenes/fondo.avif" type="image/avif" fetchpriority="high" />

  <!-- Critical CSS -->
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,Helvetica,sans-serif;
      color:#fff;
      background:#000;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    .background-image{
      background:#000 url("imagenes/fondo.avif") center / cover no-repeat;
      width:100%;
      min-height:100vh;
      min-height:100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      contain:paint;
    }
    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.7);
    }
    .content{
      position:relative;
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:18px 14px;
      width:min(92vw,520px);
    }
    .logo{
      width:200px;
      height:200px;
      object-fit:contain;
      display:block;
    }
    .title{
      margin:10px 0 15px;
      font-size:20px;
      font-weight:800;
      line-height:1.15;
      text-wrap:balance;
    }
    .subtitle{
      font-size:17px;
      margin-top:34px;
      line-height:1.25;
    }
    .description{
      color:gold;
      font-size:14px;
      font-weight:800;
      margin:28px 0 44px;
      letter-spacing:.2px;
    }
    .whatsapp-button{
      position:relative;
      overflow:hidden;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      background:linear-gradient(145deg,#155c3d,#0e2d1e);
      color:#fff;
      font-size:17px;
      font-weight:900;
      padding:12px 16px;
      border:3px solid #fff;
      border-radius:10px;
      text-decoration:none;
      margin-top:22px;
      min-width:220px;
      box-shadow:
        0 0 30px 8px gold,
        inset 0 1px 0 #ffffff33,
        0 0 12px 2px #10392899;
      animation:heartbeat 2s infinite ease-in-out;
      transition:transform .18s ease-in-out, filter .18s ease-in-out;
      will-change:transform;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }
    .whatsapp-button:active{transform:scale(.985)}
    .whatsapp-button::before{
      content:"";
      position:absolute;
      inset:0;
      width:50%;
      background:linear-gradient(120deg,transparent,rgba(255,255,255,.6),transparent);
      transform:translateX(-150%) skewX(-25deg);
      animation:shineX 3.5s infinite;
      pointer-events:none;
    }
    .whatsapp-icon{
      width:30px;
      height:30px;
      display:block;
    }
    @keyframes shineX{
      from{transform:translateX(-150%) skewX(-25deg)}
      to{transform:translateX(300%) skewX(-25deg)}
    }
    @keyframes heartbeat{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.03)}
    }
  </style>

  <!-- CSS completo diferido -->
  <link rel="stylesheet" href="./styles.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="./styles.css"></noscript>

  <!-- Performance -->
  <link rel="preconnect" href="https://connect.facebook.net" crossorigin>
  <link rel="dns-prefetch" href="//connect.facebook.net">

  <!-- Meta Pixel base -->
  <script>
    !(function(f,b,e,v,n,t,s){
      if(f.fbq) return;
      n=f.fbq=function(){n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments)};
      if(!f._fbq) f._fbq=n;
      n.push=n;
      n.loaded=!0;
      n.version='2.0';
      n.queue=[];
      t=b.createElement(e);
      t.async=!0;
      t.src=v;
      s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s);
    })(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
  </script>

  <!-- Init Pixel + user data -->
  <script>
    function normEmail(v){
      return (v||"").trim().toLowerCase();
    }

    function normPhone(v){
      let d=(v||"").replace(/\D+/g,"");
      if(!d) return "";
      if(d.startsWith("549")) return d;
      if(d.startsWith("54")) return d;
      d = d.replace(/^0+/, "").replace(/^15/, "");
      return "549"+d;
    }

    function safeUUID(){
      return (window.crypto && window.crypto.randomUUID)
        ? window.crypto.randomUUID()
        : "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,function(c){
            const r=Math.random()*16|0;
            const v=c==="x"?r:(r&0x3|0x8);
            return v.toString(16);
          });
    }

    function getOrCreateExternalId(){
      let id = localStorage.getItem("external_id");
      if(!id){
        id = safeUUID();
        localStorage.setItem("external_id", id);
      }
      return id;
    }

    (function(){
      const params = new URLSearchParams(location.search);

      window.userEmail = normEmail(params.get("em") || params.get("email") || localStorage.getItem("em") || "");
      window.userPhone = normPhone(params.get("ph") || params.get("phone") || localStorage.getItem("ph") || "");
      window.userFn = (params.get("fn") || "").trim() || undefined;
      window.userLn = (params.get("ln") || "").trim() || undefined;
      window.externalId = getOrCreateExternalId();

      fbq("init","1428301745609658",{
        external_id: window.externalId,
        em: window.userEmail || undefined,
        ph: window.userPhone || undefined,
        fn: window.userFn,
        ln: window.userLn,
        country: "AR"
      });

      fbq("track","PageView");
    })();
  </script>

  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1428301745609658&ev=PageView&noscript=1" />
  </noscript>
</head>

<body>
  <div class="container background-image">
    <div class="overlay"></div>
    <div class="content">
      <img
        src="imagenes/logo.png"
        class="logo"
        alt="BRUNBET"
        width="200"
        height="200"
        decoding="async"
        fetchpriority="high"
      />

      <p class="title">Envianos un WhatsApp<br />para crear tu cuenta</p>

      <a class="whatsapp-button" id="whatsappButton" href="#" rel="noopener noreferrer" aria-label="Crear usuario por WhatsApp">
        <span>¡CONTACTAR YA!</span>
        <img
          src="imagenes/whatsapp.png"
          alt="whatsapp"
          class="whatsapp-icon"
          width="24"
          height="24"
          decoding="async"
          loading="lazy"
        />
      </a>

      <p class="subtitle">Sin Límite de retiro<br />Sin Cronogramas<br />Ganás y cobrás a cualquier hora</p>
      <p class="description"></p>
    </div>
  </div>

  <!-- Overlay -->
  <div id="wa-redirect-overlay" class="wa-redirect-overlay" hidden>
    <div class="wa-redirect-box">
      <div class="wa-redirect-spinner"></div>
      <div id="wa-redirect-text" class="wa-redirect-text">Redirigiendo al WhatsApp...</div>
    </div>
  </div>

  <script>
    /************************************************************
     * CONFIGURACIÓN POR LANDING
     ************************************************************/
    const LANDING_CONFIG = {
      BRAND_NAME: "BRUNBET",
      MODE: "ads",
      SERVICE_BASE: "/api/get-random-phone",
      EMERGENCY_FALLBACK_NUMBER: "",
      EMERGENCY_FALLBACK_NAME: "",

      PROMO: {
        ENABLED: true,
        LANDING_TAG: "BR1"
      },

      UI: {
        OVERLAY_TEXT: "Redirigiendo al WhatsApp del Cajero...",
        CLICK_GET_NUMBER_DEADLINE_MS: 3500,
        OVERLAY_MAX_VISIBLE_MS: 5000,
        AUTO_REDIRECT_ENABLED: false,
        AUTO_REDIRECT_DELAY_MS: 10000,
        AUTO_REDIRECT_TEXT: "Redirigiendo al WhatsApp del Cajero..."
      }
    };

    /************************************************************
     * HELPERS
     ************************************************************/
    function fetchWithTimeout(url,opt={},ms=3000){
      const ctrl = new AbortController();
      const id = setTimeout(() => ctrl.abort(), ms);
      return fetch(url, { ...opt, signal: ctrl.signal }).finally(() => clearTimeout(id));
    }

    function normalizePhoneDigits(raw){
      return String(raw || "").replace(/\D+/g, "").trim();
    }

    function generateUUID(){
      return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === "x" ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function getDeviceType(){
      const ua = navigator.userAgent;
      if(/mobile/i.test(ua)) return "mobile";
      if(/tablet|ipad|playbook|silk/i.test(ua)) return "tablet";
      return "desktop";
    }

    const qs = new URLSearchParams(location.search);
    const getQueryParam = p => qs.get(p);

    const getCookie = name => {
      const m = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
      return m ? m[2] : undefined;
    };

    (function persistUTM(){
      const utm = getQueryParam("utm_campaign");
      if(utm) localStorage.setItem("utm_campaign", utm);
    })();

    function getUTMCampaign(){
      return getQueryParam("utm_campaign") || localStorage.getItem("utm_campaign") || "ORG";
    }

    function getFbc(){
      const c = getCookie("_fbc");
      if(c){
        localStorage.setItem("stored_fbc", c);
        return c;
      }
      const s = localStorage.getItem("stored_fbc");
      if(s) return s;

      const fbclid = getQueryParam("fbclid");
      if(!fbclid) return undefined;

      const fbc = "fb.1." + Date.now() + "." + fbclid;
      localStorage.setItem("stored_fbc", fbc);
      return fbc;
    }

    function getFbp(){
      const c = getCookie("_fbp");
      if(c){
        localStorage.setItem("stored_fbp", c);
        return c;
      }
      const s = localStorage.getItem("stored_fbp");
      return s || undefined;
    }

    function buildMensaje(botName, promo_code){
      const variantes = [
        n => `Hola ${n}! Vi este anuncio, me pasás info?`,
        n => `Hola ${n}! Vi el anuncio, podrías darme más info?`,
        n => `Buenas ${n}! Me contás un poco más del anuncio?`,
        n => `Hola ${n}! Quisiera saber más sobre lo que ofrecen.`,
        n => `Buenas ${n}! Me das más detalles por favor?`,
        n => `Hola ${n}! Estoy interesado, me contás cómo funciona?`,
        n => `Hola ${n}! Vi tu publicación, podrías ampliarme la info?`,
        n => `Holaaa ${n}! Me llamó la atención el anuncio, me contás más?`,
        n => `Hola ${n}! Vi tu publicidad, cómo es para registrarse?`,
        n => `Buenas ${n}! Me das información sobre cómo empezar?`
      ];

      const base = variantes[Math.floor(Math.random() * variantes.length)](botName || "Soporte");
      return promo_code ? `${base} ${promo_code}` : base;
    }

    /************************************************************
     * OVERLAY
     ************************************************************/
    let __overlayTimer = null;

    function showRedirectOverlay(text){
      const ov = document.getElementById("wa-redirect-overlay");
      const tx = document.getElementById("wa-redirect-text");

      if(tx) tx.textContent = text || LANDING_CONFIG.UI.OVERLAY_TEXT || "Redirigiendo al WhatsApp del Cajero...";
      if(ov) ov.hidden = false;

      if(__overlayTimer) clearTimeout(__overlayTimer);
      __overlayTimer = setTimeout(() => {
        hideRedirectOverlay();
      }, Number(LANDING_CONFIG.UI.OVERLAY_MAX_VISIBLE_MS || 5000));
    }

    function hideRedirectOverlay(){
      const ov = document.getElementById("wa-redirect-overlay");
      if(ov) ov.hidden = true;
      if(__overlayTimer){
        clearTimeout(__overlayTimer);
        __overlayTimer = null;
      }
    }

    /************************************************************
     * NÚMERO: WARMUP ANTES DEL CLICK
     ************************************************************/
    let __pickedResult = null;
    let __pickPromise = null;

    async function getNumberFromApi(){
      const url = `${LANDING_CONFIG.SERVICE_BASE}?mode=${encodeURIComponent(LANDING_CONFIG.MODE)}`;
      const res = await fetchWithTimeout(
        url,
        { headers: { "Cache-Control": "no-store" } },
        LANDING_CONFIG.UI.CLICK_GET_NUMBER_DEADLINE_MS || 3500
      );

      if(!res.ok) throw new Error("HTTP " + res.status);

      const data = await res.json();
      const number = normalizePhoneDigits(data?.number);

      if(!/^\d{8,17}$/.test(number)) throw new Error("Invalid number from API");

      return {
        number,
        name: data?.name || LANDING_CONFIG.BRAND_NAME,
        meta: data
      };
    }

    function warmupNumber(){
      if(__pickedResult) return Promise.resolve(__pickedResult);
      if(__pickPromise) return __pickPromise;

      __pickPromise = getNumberFromApi()
        .then(result => {
          __pickedResult = result;
          return result;
        })
        .catch(() => null);

      return __pickPromise;
    }

    /************************************************************
     * BACKEND
     ************************************************************/
    function sendToBackend(payload){
      try{
        if(navigator.sendBeacon){
          const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
          const ok = navigator.sendBeacon("/api/xz3v2q", blob);
          if(ok) return;
        }
      }catch(e){}

      try{
        fetch("/api/xz3v2q",{
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify(payload),
          keepalive:true
        });
      }catch(e){}
    }

    /************************************************************
     * CONTACTO PRINCIPAL
     ************************************************************/
    async function contactarWhatsApp({ source="main_button" } = {}){
      if(window.__waInFlight) return;
      window.__waInFlight = true;

      showRedirectOverlay(LANDING_CONFIG.UI.OVERLAY_TEXT);

      let picked = __pickedResult;

      if(!picked){
        try{
          picked = await getNumberFromApi();
          __pickedResult = picked;
        }catch(e){
          picked = {
            number: LANDING_CONFIG.EMERGENCY_FALLBACK_NUMBER,
            name: LANDING_CONFIG.EMERGENCY_FALLBACK_NAME,
            meta: { emergency: true, error: String(e?.message || e) }
          };
        }
      }

      const cleanPhone = normalizePhoneDigits(picked?.number);
      if(!/^\d{8,17}$/.test(cleanPhone)){
        hideRedirectOverlay();
        window.__waInFlight = false;
        return;
      }

      const botName = picked.name || LANDING_CONFIG.BRAND_NAME;
      const event_id = generateUUID();
      const external_id = window.externalId || getOrCreateExternalId();
      const event_source_url = location.href;
      const fbp = getFbp();
      const fbc = getFbc();

      const uuidSegment = generateUUID().replace(/-/g, "").slice(0, 12);
      const promo_code = LANDING_CONFIG.PROMO.ENABLED
        ? `${LANDING_CONFIG.PROMO.LANDING_TAG}-${uuidSegment}`
        : "";

      const mensaje = buildMensaje(botName, promo_code);

      try{
        if(window.fbq){
          fbq("set", "userData", {
            em: window.userEmail || undefined,
            ph: window.userPhone || undefined,
            fn: window.userFn,
            ln: window.userLn,
            external_id: external_id
          });

          fbq("track", "Contact", {
            content_name: "Botón WhatsApp",
            content_category: "LeadGen",
            event_source: "LandingPage",
            source: source,
            method: "Click",
            utm_campaign: getUTMCampaign(),
            promo_code: promo_code || undefined,
            device_type: getDeviceType(),
            brand: LANDING_CONFIG.BRAND_NAME || undefined
          }, { eventID: event_id });
        }
      }catch(e){}

      const payload = {
        event_name: "Contact",
        event_id,
        external_id,
        event_source_url,
        fbp,
        fbc,

        email: window.userEmail || "",
        phone: window.userPhone || "",

        fn: window.userFn || undefined,
        ln: window.userLn || undefined,

        ct: getQueryParam("ct"),
        st: getQueryParam("st"),
        zip: getQueryParam("zip"),
        country: getQueryParam("country"),

        utm_campaign: getUTMCampaign(),
        telefono_asignado: cleanPhone,
        device_type: getDeviceType(),
        promo_code,
        source,
        brand: LANDING_CONFIG.BRAND_NAME,
        mode: LANDING_CONFIG.MODE,

        geo_city: "",
        geo_region: "",
        geo_country: "",

        api_meta: picked.meta || null
      };

      sendToBackend(payload);

      setTimeout(() => {
        window.location.assign(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(mensaje)}`);
      }, 120);
    }

    /************************************************************
     * INIT UI
     ************************************************************/
    document.addEventListener("DOMContentLoaded", () => {
      warmupNumber();

      const btn = document.getElementById("whatsappButton");

      if(btn){
        btn.addEventListener("click", e => {
          e.preventDefault();
          contactarWhatsApp({ source: "main_button" });
        });
      }

      if(LANDING_CONFIG.UI.AUTO_REDIRECT_ENABLED){
        const KEY = "wa_auto_redirect_fired";
        const already = sessionStorage.getItem(KEY) === "1";

        window.addEventListener("load", () => {
          setTimeout(async () => {
            if(already) return;
            if(window.__waInFlight) return;

            sessionStorage.setItem(KEY, "1");
            showRedirectOverlay(LANDING_CONFIG.UI.AUTO_REDIRECT_TEXT || "Redirigiendo al WhatsApp del Cajero...");

            let picked = __pickedResult;

            if(!picked){
              try{
                picked = await getNumberFromApi();
                __pickedResult = picked;
              }catch{
                picked = {
                  number: LANDING_CONFIG.EMERGENCY_FALLBACK_NUMBER,
                  name: LANDING_CONFIG.EMERGENCY_FALLBACK_NAME
                };
              }
            }

            const cleanPhone = normalizePhoneDigits(picked?.number);
            if(!/^\d{8,17}$/.test(cleanPhone)){
              hideRedirectOverlay();
              return;
            }

            const msg = encodeURIComponent("Hola! Quiero info");
            window.location.assign(`https://wa.me/${cleanPhone}?text=${msg}`);
          }, LANDING_CONFIG.UI.AUTO_REDIRECT_DELAY_MS || 10000);
        });
      }

      window.addEventListener("pageshow", () => {
        window.__waInFlight = false;
      });

      document.addEventListener("visibilitychange", () => {
        if(document.visibilityState === "visible"){
          window.__waInFlight = false;
        }
      });
    });
  </script>
</body>
</html>
